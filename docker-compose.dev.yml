services:
  db:
    image: postgis/postgis:15-3.3-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cruise
      POSTGRES_PASSWORD: cruise_secret
      POSTGRES_DB: cruise_connect
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
      - ./docker/init-test-db.sh:/docker-entrypoint-initdb.d/init-test-db.sh
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cruise -d cruise_connect"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  ledger-a:
    build: ./validator
    ports:
      - "4001:4001"
    environment:
      VALIDATOR_ID: ledger-a
      VALIDATOR_PORT: "4001"
      AUDIT_HMAC_SECRET: ${AUDIT_HMAC_SECRET:-audit_secret_dev}
      VALIDATOR_INTERNAL_KEY: ${VALIDATOR_INTERNAL_KEY:-dev_validator_key}
      LEDGER_DATA_DIR: /data/ledger
      NODE_ENV: development
    volumes:
      - ledger_a_dev:/data/ledger
      - ./validator/src:/app/src
    command: ["npx", "tsx", "watch", "src/index.ts"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  ledger-b:
    build: ./validator
    ports:
      - "4002:4001"
    environment:
      VALIDATOR_ID: ledger-b
      VALIDATOR_PORT: "4001"
      AUDIT_HMAC_SECRET: ${AUDIT_HMAC_SECRET:-audit_secret_dev}
      VALIDATOR_INTERNAL_KEY: ${VALIDATOR_INTERNAL_KEY:-dev_validator_key}
      LEDGER_DATA_DIR: /data/ledger
      NODE_ENV: development
    volumes:
      - ledger_b_dev:/data/ledger
      - ./validator/src:/app/src
    command: ["npx", "tsx", "watch", "src/index.ts"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  ledger-c:
    build: ./validator
    ports:
      - "4003:4001"
    environment:
      VALIDATOR_ID: ledger-c
      VALIDATOR_PORT: "4001"
      AUDIT_HMAC_SECRET: ${AUDIT_HMAC_SECRET:-audit_secret_dev}
      VALIDATOR_INTERNAL_KEY: ${VALIDATOR_INTERNAL_KEY:-dev_validator_key}
      LEDGER_DATA_DIR: /data/ledger
      NODE_ENV: development
    volumes:
      - ledger_c_dev:/data/ledger
      - ./validator/src:/app/src
    command: ["npx", "tsx", "watch", "src/index.ts"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  backend:
    image: app_trasnporte_lockers_barcelona-backend-dev
    build:
      context: ./backend
      target: builder
    env_file:
      - ./backend/.env
    ports:
      - "9001:9000"
    environment:
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_in_production}
      AUDIT_HMAC_SECRET: ${AUDIT_HMAC_SECRET:-audit_secret_dev}
      PAYMENTS_DEMO_MODE: "true"
      DATABASE_URL: postgres://cruise:cruise_secret@db:5432/cruise_connect
      FRONTEND_URL: http://localhost:9100
      REDIS_URL: redis://redis:6379
      VALIDATOR_INTERNAL_KEY: ${VALIDATOR_INTERNAL_KEY:-dev_validator_key}
      VALIDATOR_LEDGER_A_URL: http://ledger-a:4001
      VALIDATOR_LEDGER_B_URL: http://ledger-b:4001
      VALIDATOR_LEDGER_C_URL: http://ledger-c:4001
      RL_SERVICE_URL: http://rl_service:8080
      RL_ROUTING_ENABLED: ${RL_ROUTING_ENABLED:-true}
      TWIN_URL: http://digital_twin:8090
      TWIN_PROVIDER: ${TWIN_PROVIDER:-internal}
      MIROFISH_BASE_URL: ${MIROFISH_BASE_URL:-}
      MIROFISH_API_KEY: ${MIROFISH_API_KEY:-}
      MIROFISH_PROJECT_ID: ${MIROFISH_PROJECT_ID:-}
      MIROFISH_GRAPH_ID: ${MIROFISH_GRAPH_ID:-}
    volumes:
      - ./backend/src:/app/src
    command: ["npm", "run", "dev"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ledger-a:
        condition: service_healthy
      ledger-b:
        condition: service_healthy
      ledger-c:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: app_trasnporte_lockers_barcelona-frontend-dev
    build:
      context: ./cruise-connect-main
      target: builder
    ports:
      - "9100:9100"
    environment:
      VITE_API_URL: http://localhost:9001/api
      VITE_SOCKET_URL: http://localhost:9001
      VITE_TWIN_URL: http://localhost:8091
      VITE_DEMO_MODE: "true"
    volumes:
      - ./cruise-connect-main/src:/app/src
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "9100"]
    depends_on:
      - backend
    restart: unless-stopped

  digital_twin:
    image: app_trasnporte_lockers_barcelona-digital_twin-dev
    build: ./digital_twin
    ports:
      - "8091:8090"
    environment:
      TWIN_ENV: simulation
    volumes:
      - ./digital_twin:/app/digital_twin
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  rl_service:
    image: app_trasnporte_lockers_barcelona-rl_service-dev
    build: ./rl_service
    ports:
      - "8081:8080"
    environment:
      RL_MODEL_PATH: /tmp/cruise_dispatch_ppo
      BACKEND_URL: http://backend:9000
      TWIN_URL: http://digital_twin:8090
      TWIN_PROVIDER: ${TWIN_PROVIDER:-internal}
      MIROFISH_BASE_URL: ${MIROFISH_BASE_URL:-}
      MIROFISH_API_KEY: ${MIROFISH_API_KEY:-}
      MIROFISH_PROJECT_ID: ${MIROFISH_PROJECT_ID:-}
      MIROFISH_GRAPH_ID: ${MIROFISH_GRAPH_ID:-}
    volumes:
      - ./rl_service:/app/rl_service
    command: ["uvicorn", "rl_service.main:app", "--host", "0.0.0.0", "--port", "8080", "--reload"]
    depends_on:
      backend:
        condition: service_started
      digital_twin:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata_dev:
  redisdata_dev:
  ledger_a_dev:
  ledger_b_dev:
  ledger_c_dev:
