services:
  db:
    image: postgis/postgis:15-3.3-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: cruise
      POSTGRES_PASSWORD: cruise_secret
      POSTGRES_DB: cruise_connect
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cruise -d cruise_connect"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  ledger-a:
    build: ./validator
    environment:
      VALIDATOR_ID: ledger-a
      VALIDATOR_PORT: "4001"
      AUDIT_HMAC_SECRET: ${AUDIT_HMAC_SECRET:-audit_secret_change_in_prod}
      VALIDATOR_INTERNAL_KEY: ${VALIDATOR_INTERNAL_KEY:-dev_validator_key}
      LEDGER_DATA_DIR: /data/ledger
      NODE_ENV: production
    volumes:
      - ledger_a_data:/data/ledger
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  ledger-b:
    build: ./validator
    environment:
      VALIDATOR_ID: ledger-b
      VALIDATOR_PORT: "4001"
      AUDIT_HMAC_SECRET: ${AUDIT_HMAC_SECRET:-audit_secret_change_in_prod}
      VALIDATOR_INTERNAL_KEY: ${VALIDATOR_INTERNAL_KEY:-dev_validator_key}
      LEDGER_DATA_DIR: /data/ledger
      NODE_ENV: production
    volumes:
      - ledger_b_data:/data/ledger
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  ledger-c:
    build: ./validator
    environment:
      VALIDATOR_ID: ledger-c
      VALIDATOR_PORT: "4001"
      AUDIT_HMAC_SECRET: ${AUDIT_HMAC_SECRET:-audit_secret_change_in_prod}
      VALIDATOR_INTERNAL_KEY: ${VALIDATOR_INTERNAL_KEY:-dev_validator_key}
      LEDGER_DATA_DIR: /data/ledger
      NODE_ENV: production
    volumes:
      - ledger_c_data:/data/ledger
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4001/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s

  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    ports:
      - "9000:9000"
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-d9ac5631485346636375c2a102a60325f760c2fe5b3ad5fc2f190849431a4eee}
      REFRESH_TOKEN_SECRET: ${REFRESH_TOKEN_SECRET:-dev_refresh_secret_change_for_local_only_32bytes!}
      AUDIT_HMAC_SECRET: ${AUDIT_HMAC_SECRET:-cb35c0b570c7b357a45064ed5fcb740e4822b776bf9497ca47ec883583ffb922}
      FIELD_ENCRYPTION_KEY: ${FIELD_ENCRYPTION_KEY:-dev_field_enc_key_32bytes_change!!}
      DATABASE_URL: postgres://cruise:cruise_secret@db:5432/cruise_connect
      FRONTEND_URL: http://localhost
      VALIDATOR_INTERNAL_KEY: ${VALIDATOR_INTERNAL_KEY:-dev_validator_key}
      VALIDATOR_LEDGER_A_URL: http://ledger-a:4001
      VALIDATOR_LEDGER_B_URL: http://ledger-b:4001
      VALIDATOR_LEDGER_C_URL: http://ledger-c:4001
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev_internal_key_change_in_prod}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_dev_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_dev_placeholder}
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-BGEY4zTlQko1Qf9AXG7qXzT_GUZb-q7lDMY9kREhEBj77sLSyzvr7kIN86UA7jnA1vmqQcx4vWomQqZMRY6amf0}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-GOw9Gi61Qw181kLUn4DMyCacyiJJjvQB7FBqJxCPuGQ}
      RL_SERVICE_URL: http://rl_service:8080
      TWIN_URL: http://digital_twin:8090
      TWIN_PROVIDER: ${TWIN_PROVIDER:-internal}
      MIROFISH_BASE_URL: ${MIROFISH_BASE_URL:-}
      MIROFISH_API_KEY: ${MIROFISH_API_KEY:-}
      MIROFISH_PROJECT_ID: ${MIROFISH_PROJECT_ID:-}
      MIROFISH_GRAPH_ID: ${MIROFISH_GRAPH_ID:-}
    depends_on:
      db:
        condition: service_healthy
      ledger-a:
        condition: service_healthy
      ledger-b:
        condition: service_healthy
      ledger-c:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:9000/api/health', res => { if (res.statusCode !== 200) process.exit(1); res.resume(); }).on('error', () => process.exit(1))",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build: ./cruise-connect-main
    ports:
      - "80:8080"
    environment:
      VITE_API_URL: http://localhost:9000/api
      VITE_SOCKET_URL: http://localhost:9000
      VITE_TWIN_URL: http://localhost:8090
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  digital_twin:
    build: ./digital_twin
    ports:
      - "8090:8090"
    environment:
      TWIN_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8090/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  rl_service:
    build: ./rl_service
    ports:
      - "8080:8080"
    environment:
      RL_MODEL_PATH: /tmp/cruise_dispatch_ppo
      BACKEND_URL: http://backend:9000
      TWIN_URL: http://digital_twin:8090
      TWIN_PROVIDER: ${TWIN_PROVIDER:-internal}
      MIROFISH_BASE_URL: ${MIROFISH_BASE_URL:-}
      MIROFISH_API_KEY: ${MIROFISH_API_KEY:-}
      MIROFISH_PROJECT_ID: ${MIROFISH_PROJECT_ID:-}
      MIROFISH_GRAPH_ID: ${MIROFISH_GRAPH_ID:-}
    depends_on:
      backend:
        condition: service_healthy
      digital_twin:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  pgdata:
  ledger_a_data:
  ledger_b_data:
  ledger_c_data:
