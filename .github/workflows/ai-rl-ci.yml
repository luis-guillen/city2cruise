name: AI/RL CI

on:
  pull_request:
    paths:
      - 'rl_service/**'
      - 'digital_twin/**'
      - 'scripts/validate_ai_release.py'
      - 'backend/src/services/telemetry/**'
      - 'backend/src/services/RLDispatchService.ts'
      - 'backend/src/services/GeoDispatchService.ts'
      - 'backend/src/jobs/rebalanceFleetJob.ts'
      - 'backend/src/services/ReassignmentService.ts'
      - 'backend/src/services/twin/**'
      - 'backend/src/routes/admin.ts'
      - 'backend/src/routes/admin/intervention.ts'
      - 'backend/src/__tests__/reassignment.test.ts'
      - 'backend/src/__tests__/rebalance-active.test.ts'
      - 'backend/src/__tests__/twin-sync.test.ts'
      - 'backend/src/__tests__/rl-latency.test.ts'
      - 'backend/src/__tests__/telemetry-pipeline.test.ts'
      - 'backend/src/__tests__/admin-intervention.test.ts'
      - 'backend/src/__tests__/cascade-search.test.ts'
      - 'rl_service/Dockerfile'
      - 'digital_twin/Dockerfile'
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'
      - '.github/workflows/ai-rl-ci.yml'
  push:
    branches: [main, develop]
    paths:
      - 'rl_service/**'
      - 'digital_twin/**'
      - 'scripts/validate_ai_release.py'
      - 'backend/src/services/telemetry/**'
      - 'backend/src/services/RLDispatchService.ts'
      - 'backend/src/services/GeoDispatchService.ts'
      - 'backend/src/jobs/rebalanceFleetJob.ts'
      - 'backend/src/services/ReassignmentService.ts'
      - 'backend/src/services/twin/**'
      - 'backend/src/routes/admin.ts'
      - 'backend/src/routes/admin/intervention.ts'
      - 'backend/src/__tests__/reassignment.test.ts'
      - 'backend/src/__tests__/rebalance-active.test.ts'
      - 'backend/src/__tests__/twin-sync.test.ts'
      - 'backend/src/__tests__/rl-latency.test.ts'
      - 'backend/src/__tests__/telemetry-pipeline.test.ts'
      - 'backend/src/__tests__/admin-intervention.test.ts'
      - 'backend/src/__tests__/cascade-search.test.ts'
      - 'rl_service/Dockerfile'
      - 'digital_twin/Dockerfile'
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'
      - '.github/workflows/ai-rl-ci.yml'
  workflow_dispatch:
    inputs:
      run_mirofish_smoke:
        description: 'Run the live MiroFish smoke check'
        required: false
        default: false
        type: boolean
      mirofish_base_url:
        description: 'Base URL for live MiroFish'
        required: false
        type: string
      mirofish_project_id:
        description: 'Project id for live MiroFish'
        required: false
        type: string
      mirofish_graph_id:
        description: 'Optional graph id for live MiroFish'
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: ai-rl-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-tests:
    name: Python (rl_service + digital_twin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: |
            rl_service/requirements.txt
            digital_twin/requirements.txt
      - name: Install dependencies
        run: |
          grep -v '^torch' rl_service/requirements.txt > /tmp/rl_service.requirements.txt
          pip install --index-url https://download.pytorch.org/whl/cpu "torch==2.12.1"
          pip install -r /tmp/rl_service.requirements.txt -r digital_twin/requirements.txt pytest
      - name: Test rl_service
        run: python -m pytest rl_service/tests/ rl_service/validation/tests/ -v
      - name: Test digital_twin
        run: python -m pytest digital_twin/tests/ -v
      - name: Release gate
        run: |
          python scripts/validate_ai_release.py \
            --log-dir rl_service/validation/fixtures \
            --twin-metrics rl_service/validation/fixtures/twin_metrics.json \
            --prod-metrics rl_service/validation/fixtures/prod_metrics.json

  backend-tests:
    name: Backend (AI/RL targeted)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: cruise_connect_test
          POSTGRES_USER: cruise
          POSTGRES_PASSWORD: cruise_secret
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgres://cruise:cruise_secret@localhost:5432/cruise_connect_test
      DATABASE_URL_TEST: postgres://cruise:cruise_secret@localhost:5432/cruise_connect_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-ci-test-secret-ci-test-secret
      AUDIT_HMAC_SECRET: ci-audit-hmac-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Type check
        run: pnpm exec tsc --noEmit
      - name: Targeted AI/RL tests
        run: pnpm test -- src/__tests__/reassignment.test.ts src/__tests__/rebalance-active.test.ts src/__tests__/twin-sync.test.ts src/__tests__/rl-latency.test.ts src/__tests__/telemetry-pipeline.test.ts src/__tests__/admin-intervention.test.ts src/__tests__/cascade-search.test.ts
      - name: Build
        run: pnpm run build

  docker-build:
    name: Docker (rl_service + digital_twin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build rl_service image
        uses: docker/build-push-action@v6
        with:
          context: ./rl_service
          file: ./rl_service/Dockerfile
          push: false
          tags: city2cruise-rl-service:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build digital_twin image
        uses: docker/build-push-action@v6
        with:
          context: ./digital_twin
          file: ./digital_twin/Dockerfile
          push: false
          tags: city2cruise-digital-twin:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  mirofish-smoke:
    name: MiroFish smoke (manual)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.run_mirofish_smoke
    env:
      MIROFISH_BASE_URL: ${{ inputs.mirofish_base_url }}
      MIROFISH_PROJECT_ID: ${{ inputs.mirofish_project_id }}
      MIROFISH_GRAPH_ID: ${{ inputs.mirofish_graph_id }}
      MIROFISH_API_KEY: ${{ secrets.MIROFISH_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install smoke deps
        run: pip install httpx pydantic
      - name: Validate inputs
        run: |
          test -n "$MIROFISH_BASE_URL"
          test -n "$MIROFISH_PROJECT_ID"
      - name: Run MiroFish smoke
        run: |
          python scripts/smoke_mirofish.py \
            --base-url "$MIROFISH_BASE_URL" \
            --project-id "$MIROFISH_PROJECT_ID" \
            ${MIROFISH_GRAPH_ID:+--graph-id "$MIROFISH_GRAPH_ID"} \
            ${MIROFISH_API_KEY:+--api-key "$MIROFISH_API_KEY"}
