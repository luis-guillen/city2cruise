name: E2E (Playwright)

on:
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      base_url:
        description: 'BASE_URL del frontend (vacío = build local)'
        required: false
        default: ''

permissions:
  contents: read

jobs:
  e2e:
    name: Playwright (chromium + firefox + webkit)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ./cruise-connect-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cruise-connect-main/package-lock.json
      - name: Install
        run: npm ci --legacy-peer-deps
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Build app
        run: npm run build
      - name: Run E2E
        env:
          BASE_URL: ${{ github.event.inputs.base_url }}
          BACKEND_URL: ${{ secrets.STAGING_BACKEND_URL }}
        run: npm run e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: cruise-connect-main/e2e/.report
          retention-days: 14
      - name: Upload junit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-junit
          path: cruise-connect-main/e2e/.results/junit.xml
          if-no-files-found: ignore
