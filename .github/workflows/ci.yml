name: CI

on:
  push:
    branches: [main, develop, FASE4-FASE5-FASE6]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Permisos minimos por defecto, cada job pide lo suyo
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Frontend
  # ──────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend (lint + tsc + vitest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./cruise-connect-main
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: cruise-connect-main/package-lock.json
      - name: Install
        run: npm ci --legacy-peer-deps
      - name: Lint (eslint)
        run: npm run lint
      - name: Type check (tsc --noEmit)
        run: npx tsc --noEmit
      - name: Unit tests (vitest)
        run: npm test
      - name: Build prod
        run: npm run build
      - name: Upload bundle stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: cruise-connect-main/dist
          if-no-files-found: ignore
          retention-days: 7

  # ──────────────────────────────────────────────────────────────────────────
  # Backend
  # ──────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend (lint + tsc + jest + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: cruise_connect_test
          POSTGRES_USER: cruise
          POSTGRES_PASSWORD: cruise_secret
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgres://cruise:cruise_secret@localhost:5432/cruise_connect_test
      DATABASE_URL_TEST: postgres://cruise:cruise_secret@localhost:5432/cruise_connect_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-ci-test-secret-ci-test-secret
      AUDIT_HMAC_SECRET: ci-audit-hmac-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install
        run: npm ci
      - name: Type check (tsc --noEmit)
        run: npx tsc --noEmit
      - name: Tests (jest, sin DB)
        run: npm test -- src/__tests__/cluster.test.ts src/__tests__/cache.test.ts src/__tests__/cursor-pagination.test.ts src/__tests__/compression-etag.test.ts src/__tests__/metrics.test.ts src/__tests__/health.test.ts
      - name: Tests (jest, con DB) - non-blocking
        run: npm test
        continue-on-error: true
      - name: Build prod
        run: npm run build

  # ──────────────────────────────────────────────────────────────────────────
  # Security audit
  # ──────────────────────────────────────────────────────────────────────────
  security:
    name: Security (npm audit + secret scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: npm audit (frontend) — high+ no production
        run: |
          cd cruise-connect-main
          npm audit --omit=dev --audit-level=high || echo "::warning::npm audit found high vulnerabilities (non-blocking)"
      - name: npm audit (backend) — high+ no production
        run: |
          cd backend
          npm audit --omit=dev --audit-level=high || echo "::warning::npm audit found high vulnerabilities (non-blocking)"
      - name: Gitleaks (scan repo for hardcoded secrets)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ──────────────────────────────────────────────────────────────────────────
  # Build de imagenes Docker (smoke build, no push)
  # ──────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker (build smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: city2cruise-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./cruise-connect-main
          file: ./cruise-connect-main/Dockerfile
          push: false
          tags: city2cruise-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────────────────────────────────
  # Digital Twin (Hito 5.4.1) — Python tests
  # ──────────────────────────────────────────────────────────────────────────
  digital-twin:
    name: Digital Twin (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./digital_twin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: digital_twin/requirements.txt
      - name: Install
        run: |
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Test (pytest)
        working-directory: .
        run: python -m pytest digital_twin/tests/ -v

  # ──────────────────────────────────────────────────────────────────────────
  # rl_service — twin bridge tests (Hito 5.4.2)
  # ──────────────────────────────────────────────────────────────────────────
  rl-service-bridge:
    name: rl_service twin bridge (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install minimal deps (only what twin_bridge needs)
        run: pip install httpx pytest pydantic
      - name: Test twin bridge
        run: python -m pytest rl_service/tests/test_twin_bridge.py -v

