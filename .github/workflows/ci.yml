name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    name: Backend — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - run: cd backend && npm ci
      - run: cd backend && npm run build
      - run: cd backend && npm test

  frontend-build:
    name: Frontend — build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cruise-connect-main/package-lock.json
      - run: cd cruise-connect-main && npm ci
      - run: cd cruise-connect-main && npm run build
      - name: Run frontend tests
        working-directory: ./cruise-connect-main
        run: npx vitest run

  lint:
    name: Frontend — lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: cruise-connect-main/package-lock.json
      - run: cd cruise-connect-main && npm ci
      - run: cd cruise-connect-main && npx eslint src/
