# Hito H-4.2 — Configuración Dependabot.
#
# Cobertura por ecosistema:
#   - npm: cruise-connect-main + backend (semanal, máx 5 PRs/cada uno).
#   - docker: backend + cruise-connect-main + digital_twin + rl_service (mensual).
#   - github-actions: workflows del repo (mensual).
#   - terraform: infra Fly/Neon/Upstash y AWS (mensual).
#   - pip: digital_twin + rl_service (semanal).
#
# Convención de commits: prefijo `chore(deps)` para que pase commitlint.
# Etiquetas (`labels`): permiten filtrar PRs por área en el board.

version: 2
updates:
  # ── npm ────────────────────────────────────────────────────────────────────
  - package-ecosystem: "npm"
    directory: "/cruise-connect-main"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["deps", "frontend"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    versioning-strategy: "auto"
    groups:
      radix-ui:
        patterns: ["@radix-ui/*"]
      vitest-stack:
        patterns: ["vitest", "@vitest/*", "vite", "vite-*", "@vitejs/*"]
      typescript-eslint:
        patterns: ["@typescript-eslint/*", "typescript-eslint", "eslint*"]

  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["deps", "backend"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
    versioning-strategy: "auto"
    groups:
      sentry:
        patterns: ["@sentry/*"]
      typescript-eslint:
        patterns: ["@typescript-eslint/*", "typescript-eslint", "eslint*"]

  # ── Docker ─────────────────────────────────────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "monthly"
    labels: ["deps", "docker", "backend"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "docker"
    directory: "/cruise-connect-main"
    schedule:
      interval: "monthly"
    labels: ["deps", "docker", "frontend"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "docker"
    directory: "/digital_twin"
    schedule:
      interval: "monthly"
    labels: ["deps", "docker", "digital-twin"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # ── GitHub Actions ─────────────────────────────────────────────────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels: ["deps", "ci"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # ── Terraform ──────────────────────────────────────────────────────────────
  - package-ecosystem: "terraform"
    directory: "/terraform/flyneonupstash"
    schedule:
      interval: "monthly"
    labels: ["deps", "terraform", "fly-neon-upstash"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "terraform"
    directory: "/terraform/aws"
    schedule:
      interval: "monthly"
    labels: ["deps", "terraform", "aws"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # ── Python (digital_twin + rl_service) ─────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/digital_twin"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["deps", "python", "digital-twin"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  - package-ecosystem: "pip"
    directory: "/rl_service"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels: ["deps", "python", "rl-service"]
    commit-message:
      prefix: "chore(deps)"
      include: "scope"
