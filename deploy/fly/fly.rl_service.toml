# MLOps §4.4 — Fly.io deploy config for the RL model service.
# Provides the deployment path the model service was missing (previously only
# build-smoked in CI, never shipped). NOT yet applied to live infra: the model
# is served from the checkpoint baked into the image; cloud deployment against
# production is future work (§5.2).
# Deploy: flyctl deploy --config deploy/fly/fly.rl_service.toml --app city2cruise-rl-service

app = "city2cruise-rl-service"
primary_region = "mad"  # Madrid: cercano a Las Palmas
kill_signal = "SIGTERM"
kill_timeout = 30

[build]
  dockerfile = "../../rl_service/Dockerfile"

[env]
  PORT = "8080"
  # Serve the trained checkpoint baked into the image (see rl_service/Dockerfile).
  RL_MODEL_PATH = "/app/rl_service/artifacts/cruise_dispatch_ppo"

[[services]]
  internal_port = 8080
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1     # keep 1 warm: inference must stay < 20 ms
  processes = ["app"]

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [services.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 50

  [[services.http_checks]]
    interval = "30s"
    grace_period = "20s"
    method = "get"
    path = "/health"
    protocol = "http"
    timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory_mb = 512       # torch + SB3 model in memory
