upstream backend {
    server backend:9000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# ── Hito H-1.4 (S-04): cabeceras de seguridad globales para la SPA ─────────────

server {
    # Hito H-1.3 (S-03): puerto interno cambiado a 8080 para correr en
    # nginxinc/nginx-unprivileged como UID 101 (no-root).
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ── Cabeceras de seguridad (Hito H-1.4) ──────────────────────────────────
    # HSTS — fuerza HTTPS durante 1 año, incluye subdominios y opta a la
    # preload list. El terminador TLS (Fly/CDN) es quien hace efectivo HSTS;
    # esta cabecera es informativa cuando llega tras el proxy, pero el
    # navegador la lee igualmente.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Anti-clickjacking. Mantenemos DENY porque la SPA no se embebe en iframes
    # legítimos. Si en el futuro hay que embeber Stripe Elements como popup
    # padre, usar frame-ancestors en CSP.
    add_header X-Frame-Options "DENY" always;

    # MIME-sniffing.
    add_header X-Content-Type-Options "nosniff" always;

    # Política de Referrer.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Permissions-Policy: micrófono y cámara desactivados; geolocalización y
    # pago restringidos al propio origen (cliente y conductor usan GPS y
    # Stripe Elements).
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;

    # Content-Security-Policy:
    #   - script-src incluye 'wasm-unsafe-eval' (recharts) y js.stripe.com.
    #   - style-src 'unsafe-inline' por Tailwind/shadcn (clases inline).
    #   - img-src admite tiles de OSM y CDN principal.
    #   - connect-src cubre el backend mismo origen, websockets, Stripe API y
    #     Sentry. El backend live en la misma autoridad que la SPA gracias al
    #     proxy Nginx, así que 'self' basta.
    #   - frame-src para Stripe Elements + redirect 3DS.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval' https://js.stripe.com https://browser.sentry-cdn.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.tile.openstreetmap.org https://tile.openstreetmap.org; font-src 'self' data:; connect-src 'self' https://api.stripe.com wss: ws: https://*.sentry.io; frame-src https://js.stripe.com https://hooks.stripe.com; worker-src 'self' blob:; manifest-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self';" always;

    # Cross-Origin-Opener-Policy: aísla el contexto del navegador (defensa
    # contra Spectre cross-origin). same-origin-allow-popups es lo que
    # Stripe necesita para abrir su 3DS popup sin romper la app.
    add_header Cross-Origin-Opener-Policy "same-origin-allow-popups" always;

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy Socket.IO to backend
    location /socket.io/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # SPA fallback: serve index.html for all React Router routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
