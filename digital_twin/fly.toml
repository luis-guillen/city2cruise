# fly.toml para city2cruise-twin
# flyctl launch --copy-config --no-deploy --name city2cruise-twin

app = "city2cruise-twin"
primary_region = "mad"

[build]
  dockerfile = "Dockerfile"

[env]
  TWIN_ENV = "production"
  TWIN_CORS_ORIGINS = "https://city2cruise.pages.dev,https://city2cruise-staging-web.pages.dev"

[http_service]
  internal_port = 8090
  force_https = true
  auto_stop_machines = true   # se duerme si no hay tráfico (free tier)
  auto_start_machines = true
  min_machines_running = 0    # 0 hasta que sea crítico

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"
